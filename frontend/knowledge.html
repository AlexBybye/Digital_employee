<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>私有知识库 - 运维数字员工</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="knowledge">
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <h1>运维数字员工</h1>
          <p>知识沉淀</p>
        </div>
        <nav class="nav">
          <a href="./index.html">系统总览</a>
          <a href="./self-service.html">前台自助服务</a>
          <a href="./tickets.html">申告工单处理</a>
          <a href="./users.html">运维账号管理</a>
          <a class="active" href="./knowledge.html">私有知识库</a>
          <a href="./rpa.html">RPA 自动化</a>
        </nav>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h2>私有知识库 FAQ</h2>
            <p>维护 FAQ 问答对，供 RAG 检索使用。</p>
          </div>
          <div class="status" id="systemStatus">正在连接后端...</div>
          <div id="userInfo" style="display:none;font-size:13px;color:var(--muted);white-space:nowrap;">
            <span id="displayUser"></span>
            <button class="ghost" id="logoutBtn" style="margin-left:8px;padding:2px 10px;font-size:12px;">退出</button>
          </div>
        </div>

        <section class="panel">
          <h3>FAQ 表单</h3>
          <input id="faqId" type="hidden" />
          <label for="faqQuestion">问题</label>
          <input id="faqQuestion" value="堡垒机无法登录怎么处理？" />
          <label for="faqAnswer">答案</label>
          <textarea id="faqAnswer">检查账号状态、MFA 绑定状态和客户端网络连通性，必要时转二线处理。</textarea>
          <label for="faqTags">标签，使用英文逗号分隔</label>
          <input id="faqTags" value="堡垒机,账号,网络" />
          <div class="actions">
            <button id="createFaq">新增 FAQ</button>
            <button class="secondary" id="updateFaq">保存修改</button>
            <button class="ghost" id="clearFaqForm">清空表单</button>
            <button class="ghost" id="loadFaqs">刷新列表</button>
          </div>
          <pre id="faqResult">FAQ 操作结果会显示在这里。</pre>
        </section>

        <section class="panel">
          <h3>FAQ 列表</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>问题</th>
                  <th>答案</th>
                  <th>标签</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="faqTable"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-overlay" id="faqDeleteModal">
      <div class="modal-box">
        <h3>确认删除 FAQ</h3>
        <p>确定要删除 FAQ <span id="faqDeleteId">#?</span> 吗？此操作不可撤销。</p>
        <div class="modal-actions">
          <button class="secondary" id="faqDeleteCancel">返回</button>
          <button class="danger" id="faqDeleteConfirm">确定删除</button>
        </div>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
