<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>运维账号管理 - 运维数字员工</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="users">
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <h1>运维数字员工</h1>
          <p>账号维护</p>
        </div>
        <nav class="nav">
          <a href="./index.html">系统总览</a>
          <a href="./self-service.html">前台自助服务</a>
          <a href="./tickets.html">申告工单处理</a>
          <a class="active" href="./users.html">运维账号管理</a>
          <a href="./knowledge.html">私有知识库</a>
          <a href="./rpa.html">RPA 自动化</a>
        </nav>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h2>运维账号管理</h2>
            <p>完成账号新增、查询、修改、删除、冻结和解冻。</p>
          </div>
          <div class="status" id="systemStatus">正在连接后端...</div>
          <div id="userInfo" style="display:none;font-size:13px;color:var(--muted);white-space:nowrap;">
            <span id="displayUser"></span>
            <button class="ghost" id="logoutBtn" style="margin-left:8px;padding:2px 10px;font-size:12px;">退出</button>
          </div>
        </div>

        <section class="panel">
          <h3>查询条件</h3>
          <div class="grid three">
            <div>
              <label for="userKeyword">关键词</label>
              <input id="userKeyword" placeholder="用户名、姓名、部门、电话" />
            </div>
            <div>
              <label for="userRoleFilter">角色</label>
              <select id="userRoleFilter">
                <option value="">全部</option>
                <option value="admin">admin</option>
                <option value="operator">operator</option>
                <option value="viewer">viewer</option>
              </select>
            </div>
            <div>
              <label for="userStatusFilter">状态</label>
              <select id="userStatusFilter">
                <option value="">全部</option>
                <option value="active">active</option>
                <option value="frozen">frozen</option>
              </select>
            </div>
          </div>
          <div class="actions">
            <button id="loadUsers">查询账号</button>
          </div>
        </section>

        <section class="panel">
          <h3>账号表单</h3>
          <input id="userId" type="hidden" />
          <div class="grid three">
            <div>
              <label for="username">用户名</label>
              <input id="username" placeholder="请输入用户名" />
            </div>
            <div>
              <label for="password">密码</label>
              <input id="password" placeholder="请输入密码" type="password" />
            </div>
            <div>
              <label for="role">角色</label>
              <select id="role">
                <option value="operator">operator</option>
                <option value="admin">admin</option>
                <option value="viewer">viewer</option>
              </select>
            </div>
            <div>
              <label for="fullName">姓名</label>
              <input id="fullName" placeholder="请输入姓名" />
            </div>
            <div>
              <label for="department">部门</label>
              <input id="department" placeholder="请输入部门" />
            </div>
            <div>
              <label for="phone">电话</label>
              <input id="phone" placeholder="请输入电话" />
            </div>
            <div>
              <label for="email">邮箱</label>
              <input id="email" placeholder="请输入邮箱" />
            </div>
            <div>
              <label for="userStatus">状态</label>
              <select id="userStatus">
                <option value="active">active</option>
                <option value="frozen">frozen</option>
              </select>
            </div>
          </div>
          <div class="actions">
            <button id="createUser">新增账号</button>
            <button class="secondary" id="updateUser">保存修改</button>
            <button class="ghost" id="clearUserForm">清空表单</button>
          </div>
          <pre id="userResult">账号操作结果会显示在这里。</pre>
        </section>

        <section class="panel">
          <h3>账号列表</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>账号</th>
                  <th>身份信息</th>
                  <th>角色</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="usersTable"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-overlay" id="userDeleteModal">
      <div class="modal-box">
        <h3>确认删除账号</h3>
        <p>确定要删除账号 <span id="userDeleteName">#?</span> 吗？此操作不可撤销。</p>
        <div class="modal-actions">
          <button class="secondary" id="userDeleteCancel">返回</button>
          <button class="danger" id="userDeleteConfirm">确定删除</button>
        </div>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
